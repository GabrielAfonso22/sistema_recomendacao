<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonho dos Pés - CRM | Acesso</title>
    <meta name="description" content="Plataforma de CRM e Motor de Recomendação Inteligente da Sonho dos Pés.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --brand-pink: #E6007E;
            --brand-pink-dark: #c4006b;
            --brand-pink-light: #ff3399;
            --brand-pink-glow: rgba(230, 0, 126, 0.18);
            --bg: #F0F2F5;
            --card-bg: #FFFFFF;
            --text-primary: #111827;
            --text-secondary: #6B7280;
            --text-muted: #9CA3AF;
            --border: #E5E7EB;
            --border-focus: #E6007E;
            --input-bg: #F9FAFB;
            --error: #DC2626;
            --error-bg: #FEF2F2;
            --error-border: #FECACA;
            --shadow-card: 0 4px 6px -1px rgba(0,0,0,0.05), 0 20px 50px -10px rgba(0,0,0,0.08);
            --shadow-btn: 0 4px 15px rgba(230, 0, 126, 0.4);
            --shadow-btn-hover: 0 8px 25px rgba(230, 0, 126, 0.55);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(230,0,126,0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(230,0,126,0.03) 0%, transparent 55%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        /* ── Partículas decorativas ── */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.07;
            pointer-events: none;
            z-index: 0;
        }
        .bg-orb-1 {
            width: 400px; height: 400px;
            background: var(--brand-pink);
            top: -100px; left: -100px;
            animation: float1 12s ease-in-out infinite;
        }
        .bg-orb-2 {
            width: 300px; height: 300px;
            background: var(--brand-pink);
            bottom: -80px; right: -80px;
            animation: float2 15s ease-in-out infinite;
        }
        @keyframes float1 {
            0%, 100% { transform: translate(0,0); }
            50% { transform: translate(30px, 20px); }
        }
        @keyframes float2 {
            0%, 100% { transform: translate(0,0); }
            50% { transform: translate(-20px, -30px); }
        }

        /* ── Card principal ── */
        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .login-card {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: var(--shadow-card);
            padding: 3rem 3rem 2.5rem;
            border: 1px solid rgba(255,255,255,0.8);
        }

        /* ── Cabeçalho / Logo ── */
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo-mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px; height: 64px;
            background: linear-gradient(135deg, var(--brand-pink), var(--brand-pink-light));
            border-radius: 16px;
            margin-bottom: 1.25rem;
            box-shadow: 0 8px 24px var(--brand-pink-glow);
        }
        .logo-mark svg {
            width: 32px; height: 32px;
            fill: white;
        }
        .brand-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }
        .brand-name span {
            color: var(--brand-pink);
        }
        .brand-tagline {
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-top: 0.3rem;
        }

        /* ── Divider ── */
        .divider {
            height: 1px;
            background: var(--border);
            margin-bottom: 1.75rem;
        }

        /* ── Form ── */
        .form-group {
            margin-bottom: 1rem;
        }
        .form-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-bottom: 0.45rem;
        }
        .input-wrap {
            position: relative;
        }
        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            display: flex;
            align-items: center;
        }
        .input-icon svg {
            width: 16px; height: 16px;
        }
        .form-input {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 2.8rem;
            background: var(--input-bg);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        .form-input::placeholder {
            color: var(--text-muted);
        }
        .form-input:focus {
            border-color: var(--brand-pink);
            background: white;
            box-shadow: 0 0 0 3px var(--brand-pink-glow);
        }
        .form-input.input-error {
            border-color: var(--error);
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1);
        }

        /* ── Botão principal ── */
        .btn-login {
            width: 100%;
            padding: 1rem 1.5rem;
            margin-top: 1.75rem;
            background: linear-gradient(135deg, var(--brand-pink), var(--brand-pink-light));
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            cursor: pointer;
            box-shadow: var(--shadow-btn);
            transition: transform 0.18s, box-shadow 0.18s, opacity 0.18s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-login:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--shadow-btn-hover);
        }
        .btn-login:active:not(:disabled) {
            transform: translateY(0);
        }
        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* ── Spinner dentro do botão ── */
        .btn-spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .btn-login.loading .btn-spinner { display: block; }
        .btn-login.loading .btn-text { display: none; }

        /* ── Mensagem de erro ── */
        .error-message {
            display: none;
            margin-top: 0.875rem;
            padding: 0.65rem 0.875rem;
            background: var(--error-bg);
            border: 1px solid var(--error-border);
            border-radius: 8px;
            color: var(--error);
            font-size: 0.845rem;
            font-weight: 500;
            align-items: center;
            gap: 8px;
            animation: fadeIn 0.2s ease;
        }
        .error-message.visible {
            display: flex;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .error-message svg {
            flex-shrink: 0;
            width: 15px; height: 15px;
        }

        /* ── Footer do card ── */
        .login-footer {
            margin-top: 1.75rem;
            text-align: center;
        }
        .login-footer p {
            font-size: 0.78rem;
            color: var(--text-muted);
        }
        .login-footer p span {
            color: var(--brand-pink);
            font-weight: 600;
        }

        /* ── Rodapé externo ── */
        .page-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            z-index: 1;
            position: relative;
        }

        /* ── Shake animation para erro ── */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%       { transform: translateX(-6px); }
            40%       { transform: translateX(6px); }
            60%       { transform: translateX(-4px); }
            80%       { transform: translateX(4px); }
        }
        .shake { animation: shake 0.4s ease; }
    </style>
</head>
<body>

    <!-- Orbs decorativos de fundo -->
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>

    <div class="login-wrapper">
        <div class="login-card">

            <!-- Cabeçalho com logo -->
            <div class="login-header">
                <div class="logo-mark" aria-hidden="true">
                    <!-- Ícone de sapato estilizado -->
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M22 17H2a2 2 0 0 1-2-2v-1l2-5h7l1 3h5l1-3h4l2 5v1a2 2 0 0 1-2 2zM4 17v2h16v-2z"/>
                    </svg>
                </div>
                <div class="brand-name">Sonho dos Pés <span>·</span> CRM</div>
                <div class="brand-tagline">Motor de Recomendação Inteligente</div>
            </div>

            <div class="divider"></div>

            <!-- Formulário -->
            <form id="loginForm" novalidate>

                <div class="form-group">
                    <label class="form-label" for="emailInput">E-mail</label>
                    <div class="input-wrap">
                        <span class="input-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                                <polyline points="22,6 12,13 2,6"/>
                            </svg>
                        </span>
                        <input
                            type="email"
                            id="emailInput"
                            class="form-input"
                            placeholder="gestor@empresa.com.br"
                            autocomplete="email"
                            required
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="passwordInput">Senha</label>
                    <div class="input-wrap">
                        <span class="input-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                        </span>
                        <input
                            type="password"
                            id="passwordInput"
                            class="form-input"
                            placeholder="••••••••"
                            autocomplete="current-password"
                            required
                        >
                    </div>
                </div>

                <!-- Mensagem de erro -->
                <div class="error-message" id="errorMessage" role="alert" aria-live="polite">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    <span id="errorText">Credenciais inválidas. Tente novamente.</span>
                </div>

                <!-- Botão Entrar -->
                <button type="submit" class="btn-login" id="loginBtn">
                    <div class="btn-spinner" id="btnSpinner" aria-hidden="true"></div>
                    <span class="btn-text">Entrar</span>
                </button>

            </form>

            <!-- Rodapé do card -->
            <div class="login-footer">
                <p>Acesso restrito a <span>gestores autorizados</span>.</p>
            </div>
        </div>

        <div class="page-footer">
            &copy; 2025 Sonho dos Pés &nbsp;·&nbsp; Plataforma CRM Privada
        </div>
    </div>

    <script src="/static/login.js"></script>
</body>
</html>
